name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # write: the workflow creates a GitHub release for the tag
      contents: write
      # OIDC token for NuGet.org trusted publishing (no stored API key)
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # MinVer derives the version from git history and tags
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/Runnel.AzureMonitor.RequestLogging -c Release --no-build -o artifacts

      # Exchanges the workflow's OIDC token for a short-lived NuGet.org API key.
      # Requires a Trusted Publishing policy on NuGet.org for this repo + workflow,
      # and the NUGET_USER repository variable set to the NuGet.org username.
      - name: NuGet.org login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*.nupkg artifacts/*.snupkg
          --verify-tag
          --generate-notes
