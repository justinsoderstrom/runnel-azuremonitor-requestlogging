name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # write: the workflow creates a GitHub release for the tag
      contents: write
      # OIDC token for NuGet.org trusted publishing (no stored API key)
      id-token: write
    steps:
      # Third-party actions are pinned to commit SHAs (Dependabot keeps them updated) —
      # this job holds id-token: write, so a tampered action tag could publish packages
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # MinVer derives the version from git history and tags
          fetch-depth: 0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/Runnel.AzureMonitor.RequestLogging -c Release --no-build -o artifacts

      # Exchanges the workflow's OIDC token for a short-lived NuGet.org API key.
      # Requires a Trusted Publishing policy on NuGet.org for this repo + workflow,
      # and the NUGET_USER repository variable set to the NuGet.org username.
      - name: NuGet.org login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # A hyphen in the tag means a SemVer prerelease (v0.1.0-preview.1);
        # mark the GitHub release to match so it isn't shown as "latest"
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*.nupkg artifacts/*.snupkg
          --verify-tag
          --generate-notes
          ${{ contains(github.ref_name, '-') && '--prerelease' || '' }}
