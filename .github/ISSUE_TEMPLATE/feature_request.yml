name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case rather than only the solution — it helps find the best fit.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, including custom `ISensitiveDataFilter` / `IBodyReader` / `IActivityTagWriter` implementations.
  - type: markdown
    attributes:
      value: |
        **Heads up:** `BodyLoggerOptions` property names and defaults are a frozen migration contract with the `Azureblue.ApplicationInsights.RequestLogging` package — requests to rename options or change defaults will be declined. New additive options are fair game.
